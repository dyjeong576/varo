name: GHCR Cleanup

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    runs-on:
      - self-hosted
      - Linux
      - ARM64
      - varo-prod
    steps:
      - name: Delete old GHCR image versions
        uses: actions/github-script@v7
        env:
          KEEP_COUNT: "10"
        with:
          script: |
            const keepCount = Number(process.env.KEEP_COUNT ?? "10");
            const owner = context.repo.owner;
            const packageNames = ["varo-frontend", "varo-backend"];
            const ownerInfo = await github.rest.users.getByUsername({ username: owner });
            const isOrg = ownerInfo.data.type === "Organization";
            const shortShaPattern = /^[0-9a-f]{7}$/;

            async function listVersions(packageName) {
              const versions = [];

              for (let page = 1; page <= 10; page += 1) {
                const response = isOrg
                  ? await github.request(
                      "GET /orgs/{org}/packages/{package_type}/{package_name}/versions",
                      {
                        org: owner,
                        package_type: "container",
                        package_name: packageName,
                        per_page: 100,
                        page,
                      },
                    )
                  : await github.request(
                      "GET /users/{username}/packages/{package_type}/{package_name}/versions",
                      {
                        username: owner,
                        package_type: "container",
                        package_name: packageName,
                        per_page: 100,
                        page,
                      },
                    );

                versions.push(...response.data);

                if (response.data.length < 100) {
                  break;
                }
              }

              return versions;
            }

            async function deleteVersion(packageName, versionId) {
              if (isOrg) {
                await github.request(
                  "DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}",
                  {
                    org: owner,
                    package_type: "container",
                    package_name: packageName,
                    package_version_id: versionId,
                  },
                );

                return;
              }

              await github.request(
                "DELETE /users/{username}/packages/{package_type}/{package_name}/versions/{package_version_id}",
                {
                  username: owner,
                  package_type: "container",
                  package_name: packageName,
                  package_version_id: versionId,
                },
              );
            }

            for (const packageName of packageNames) {
              const versions = await listVersions(packageName);
              const protectedIds = new Set();
              const shortShaVersions = versions
                .filter((version) =>
                  (version.metadata?.container?.tags ?? []).some((tag) => shortShaPattern.test(tag)),
                )
                .sort((left, right) => Date.parse(right.updated_at) - Date.parse(left.updated_at));

              for (const version of shortShaVersions.slice(0, keepCount)) {
                protectedIds.add(version.id);
              }

              for (const version of versions) {
                const tags = version.metadata?.container?.tags ?? [];

                if (tags.includes("prod")) {
                  protectedIds.add(version.id);
                }
              }

              const staleVersions = versions.filter((version) => !protectedIds.has(version.id));

              core.info(
                `${packageName}: keeping ${protectedIds.size} versions, deleting ${staleVersions.length} versions`,
              );

              for (const version of staleVersions) {
                await deleteVersion(packageName, version.id);
                core.info(`${packageName}: deleted version ${version.id}`);
              }
            }
