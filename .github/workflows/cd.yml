name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
    steps:
      - id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        service: [frontend, backend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_PULL_USERNAME }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ needs.prepare.outputs.owner_lc }}/varo-${{ matrix.service }}:${{ github.sha }}

  deploy:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - varo-prod
    needs:
      - prepare
      - build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Sync deployment assets on EC2 self-hosted runner
        run: |
          set -euo pipefail
          ROOT_DIR="/srv/varo"
          WWW_CONF="$ROOT_DIR/nginx/www.varocheck.com.conf"
          API_CONF="$ROOT_DIR/nginx/api.varocheck.com.conf"

          sudo mkdir -p "$ROOT_DIR/compose" "$ROOT_DIR/nginx" "$ROOT_DIR/env" /var/www/certbot

          sudo cp docker-compose.prod.yml "$ROOT_DIR/compose/docker-compose.prod.yml"
          sudo cp deploy.sh "$ROOT_DIR/compose/deploy.sh"
          sudo chmod +x "$ROOT_DIR/compose/deploy.sh"

          test -f "$WWW_CONF" || { echo "Missing nginx config: $WWW_CONF" >&2; exit 1; }
          test -f "$API_CONF" || { echo "Missing nginx config: $API_CONF" >&2; exit 1; }

          sudo cp "$WWW_CONF" /etc/nginx/sites-available/www.varocheck.com.conf
          sudo cp "$API_CONF" /etc/nginx/sites-available/api.varocheck.com.conf

          sudo ln -sfn /etc/nginx/sites-available/www.varocheck.com.conf /etc/nginx/sites-enabled/www.varocheck.com.conf
          sudo ln -sfn /etc/nginx/sites-available/api.varocheck.com.conf /etc/nginx/sites-enabled/api.varocheck.com.conf

          sudo nginx -t
          sudo systemctl reload nginx

      - name: Deploy release on EC2 self-hosted runner
        env:
          GITHUB_SHA: ${{ github.sha }}
          OWNER_LC: ${{ needs.prepare.outputs.owner_lc }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PULL_USERNAME }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          set -euo pipefail
          ROOT_DIR="/srv/varo"

          sudo env \
            FRONTEND_IMAGE="ghcr.io/${OWNER_LC}/varo-frontend" \
            BACKEND_IMAGE="ghcr.io/${OWNER_LC}/varo-backend" \
            IMAGE_TAG="${GITHUB_SHA}" \
            GHCR_USERNAME="${GHCR_PULL_USERNAME}" \
            GHCR_TOKEN="${GHCR_PULL_TOKEN}" \
            ROOT_DIR="$ROOT_DIR" \
            "$ROOT_DIR/compose/deploy.sh"

      - name: Verify public backend health
        run: curl --fail --retry 10 --retry-delay 5 --retry-connrefused https://api.varocheck.com/api/v1/health
